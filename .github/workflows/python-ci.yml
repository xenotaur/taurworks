name: Python CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install black==24.10.0 ruff==0.6.9

      - name: Lint
        run: ./scripts/lint

      - name: Test
        run: ./scripts/test

      - name: Smoke
        run: ./scripts/smoke
