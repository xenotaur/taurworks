name: Python CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and constrained developer tooling
        run: ./scripts/develop

      - name: Lint
        run: ./scripts/lint

      - name: Test
        run: ./scripts/test

      - name: Portability test
        run: ./scripts/test-portability

      - name: Smoke
        run: ./scripts/smoke
