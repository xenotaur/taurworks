name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Run unit/regression tests
        run: scripts/test

      - name: Run lint
        run: scripts/lint

      - name: Run formatting checks
        run: scripts/format --check
